<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-labelledby="heroDeskTitle">
  <title id="heroDeskTitle">Calm workspace with laptop and plant for virtual care</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eef6"/>
      <stop offset="45%" style="stop-color:#f0f4fa"/>
      <stop offset="100%" style="stop-color:#e6f0f0"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#d4e8f5"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <!-- Soft window light -->
  <ellipse cx="900" cy="180" rx="380" ry="220" fill="#fff" opacity="0.45" filter="url(#soft)"/>
  <!-- Desk surface -->
  <rect x="80" y="560" width="1040" height="24" rx="4" fill="#c5d3e3" opacity="0.5"/>
  <rect x="60" y="584" width="1080" height="200" fill="#dce3ed"/>
  <!-- Laptop -->
  <rect x="380" y="380" width="440" height="280" rx="8" fill="#b8c5d4"/>
  <rect x="392" y="392" width="416" height="248" rx="4" fill="url(#screen)"/>
  <rect x="408" y="408" width="384" height="216" rx="2" fill="#fff" opacity="0.7"/>
  <!-- Simple UI hint on screen -->
  <rect x="428" y="432" width="120" height="8" rx="2" fill="#1a4b84" opacity="0.25"/>
  <rect x="428" y="452" width="200" height="6" rx="2" fill="#1a4b84" opacity="0.12"/>
  <rect x="428" y="468" width="160" height="6" rx="2" fill="#1a4b84" opacity="0.12"/>
  <path d="M 320 660 L 880 660 L 860 680 L 340 680 Z" fill="#a8b5c8"/>
  <!-- Plant pot -->
  <ellipse cx="920" cy="540" rx="48" ry="14" fill="#9a8b7a"/>
  <rect x="872" y="420" width="96" height="120" rx="16" fill="#8b7355" opacity="0.35"/>
  <!-- Leaves -->
  <ellipse cx="900" cy="360" rx="28" ry="52" fill="#0c6e72" opacity="0.55" transform="rotate(-15 900 360)"/>
  <ellipse cx="940" cy="340" rx="24" ry="48" fill="#1a4b84" opacity="0.35" transform="rotate(12 940 340)"/>
  <ellipse cx="880" cy="330" rx="22" ry="44" fill="#0c6e72" opacity="0.4" transform="rotate(-8 880 330)"/>
  <!-- Mug -->
  <rect x="240" y="500" width="56" height="64" rx="6" fill="#fff" opacity="0.85"/>
  <rect x="248" y="512" width="40" height="40" rx="2" fill="#e8eef6"/>
</svg>
